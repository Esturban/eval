{{- with .Params.faq -}}
<section class="mx-auto mt-12 max-w-4xl px-4 pb-12">
    <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-900">
        <p class="font-mono text-xs font-semibold uppercase tracking-[0.24em] text-cyan-600 dark:text-cyan-300">FAQ</p>
        <h2 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950 dark:text-white">Questions operators usually ask</h2>
        <div class="mt-8 space-y-5">
            {{ range . }}
            <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5 dark:border-slate-700 dark:bg-slate-950">
                <h3 class="text-lg font-semibold text-slate-950 dark:text-white">{{ .question }}</h3>
                <p class="mt-3 text-base leading-7 text-slate-600 dark:text-slate-300">{{ .answer | markdownify }}</p>
            </div>
            {{ end }}
        </div>
    </div>
</section>
{{- end -}}

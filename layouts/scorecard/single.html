{{ define "main" }}
<article>
    <header class="bg-slate-950">
        <div class="mx-auto max-w-6xl px-4 py-16">
            <p class="font-mono text-xs font-semibold uppercase tracking-[0.24em] text-cyan-300">Free diagnostic</p>
            <h1 class="mt-4 max-w-4xl text-4xl font-black tracking-tight text-white md:text-5xl">{{ .Title }}</h1>
            <p class="mt-6 max-w-3xl text-lg leading-8 text-slate-300">{{ .Description }}</p>
        </div>
    </header>

    <div class="mx-auto max-w-4xl px-4 pt-10 prose dark:prose-invert dark:text-white">
        {{ .Content }}
    </div>

    {{ partial "revenue-signal-scorecard.html" . }}
    {{ partial "page-faq.html" . }}

    {{ $scorecardScript := resources.Get "js/revenue-signal-scorecard.js" | js.Build }}
    <script src="{{ $scorecardScript.RelPermalink }}" defer></script>
</article>
{{ end }}

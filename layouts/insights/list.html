{{ define "main" }}
<main>
    <article>
        <header class="bg-slate-950">
            <div class="mx-auto max-w-6xl px-4 py-16">
                <p class="font-mono text-xs font-semibold uppercase tracking-[0.24em] text-cyan-300">Insights</p>
                <h1 class="mt-4 text-4xl font-black tracking-tight text-white md:text-5xl">{{ .Title | markdownify | emojify }}</h1>
                {{ with .Content }}
                <div class="mt-6 max-w-3xl text-lg leading-8 text-slate-300 prose prose-invert">
                    {{ . }}
                </div>
                {{ end }}
            </div>
        </header>
        {{ partial "insights-template.html" . }}
    </article>
    <div class="max-w-xl mx-auto my-16">
        {{ partial "pagination.html" . }}
    </div>
</main>
{{ end }}
